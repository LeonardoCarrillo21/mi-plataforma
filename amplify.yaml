version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Aquí ya estamos en la raíz, no hace falta cd ../..
        - npx nx build admin-dashboard --prod
  artifacts:
    # Ruta absoluta desde la raíz
    baseDirectory: dist/apps/admin-dashboard/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*