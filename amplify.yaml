version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Añadimos --no-cloud para que no intente conectar con Nx Cloud
        - npx nx build admin-dashboard --prod --no-cloud
  artifacts:
    baseDirectory: dist/apps/admin-dashboard/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*