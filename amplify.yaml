version: 1
applications:
  - appRoot: apps/admin-dashboard
    frontend:
      phases:
        preBuild:
          commands:
            # Forzamos la instalación en la raíz real del monorepo
            - cd ../.. && npm ci
        build:
          commands:
            # Ejecutamos el build desde la raíz para que Nx encuentre el workspace
            - cd ../.. && npx nx build admin-dashboard --prod
      artifacts:
        # Importante: Como estamos dentro de apps/admin-dashboard, 
        # subimos dos niveles para entrar a la carpeta dist de la raíz
        baseDirectory: ../../dist/apps/admin-dashboard/browser
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*