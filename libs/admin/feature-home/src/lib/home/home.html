<div class="p-6">

  <h1 class="text-3xl font-bold text-gray-800 mb-8">Panel de Control General</h1>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
      <p class="text-sm font-medium text-gray-500 uppercase">Total Empleados</p>
      <p class="text-3xl font-bold text-gray-900">{{ totalEmployees() }}</p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
      <p class="text-sm font-medium text-gray-500 uppercase">Gasto en Nómina (Mensual)</p>
      <p class="text-3xl font-bold text-gray-900">{{ totalPayroll() | currency }}</p>
    </div>


    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-purple-500">
      <p class="text-sm font-medium text-gray-500 uppercase">Salario Promedio</p>
      <p class="text-3xl font-bold text-gray-900">{{ avgSalary() | currency }}</p>
    </div>
    
  </div>
  <div class="mt-10 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
  <h2 class="text-xl font-bold text-gray-800 mb-4">Inversión Mensual por Departamento</h2>
  
  <div style="display: block;">
    <canvas baseChart
      [data]="chartData()"
      [options]="barChartOptions"
      [type]="barChartType">
    </canvas>
    </div>
  </div>
</div>
