<div class="min-h-screen bg-gray-100 p-8">
  <div>
    <h1 class="text-4xl font-bold text-center text-gray-800 mb-8">
      Gestión de Trabajadores
    </h1>
  </div>
  <div class="grid justify-center mb-6">
    <div class="flex items-center gap-4 mr-4 w-full max-w-2xl">
      <div class="search w-full">
        <input
          type="text"
          placeholder="Buscar por nombre, email o depto..."
          [ngModel]="searchTerm()"
          (ngModelChange)="searchTerm.set($event)"
          class="border w-full border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      <button
        *ngIf="!showForm"
        (click)="abrirFormularioNuevo()"
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 rounded-lg shadow transition flex items-center gap-2"
      >
        <span class="text-xl">+</span> Agregar Trabajador
      </button>
    </div>
    <div class="flex items-center gap-4 mr-4 w-full max-w-2xl justify-start">
      <div class="flex gap-2 m-4">
        <label
          class="cursor-pointer bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg shadow transition flex items-center gap-2"
        >
          <span>📊 Importar Excel</span>
          <input
            type="file"
            (change)="onFileChange($event)"
            accept=".xlsx, .xls"
            class="hidden"
          />
        </label>
        
        <button
          (click)="descargarPlantilla()"
          class="bg-gray-400 text-white hover:underline text-sm px-4 py-2 rounded-lg shadow transition flex items-center gap-2 "
        >
          📥 Descargar plantilla de Excel
        </button>
      </div>
    </div>
  </div>

  <div
    *ngIf="showForm"
    class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6"
  >
    <div
      *ngIf="showForm"
      class="bg-gray-50 p-6 rounded-xl border border-gray-200 mb-8 shadow-inner animate-fade-in"
    >
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold text-gray-700">
          {{ isEditing ? 'Editar Trabajador' : 'Nuevo Registro' }}
        </h2>
        <button
          (click)="cancelarEdicion()"
          class="text-gray-400 hover:text-gray-600"
        >
          ✕ Cerrar
        </button>
      </div>

      <form (ngSubmit)="enviarDatos()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700"
            >Nombre Completo</label
          >
          <input
            type="text"
            [(ngModel)]="workerModel.name"
            name="name"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Email</label>
          <input
            type="email"
            [(ngModel)]="workerModel.email"
            name="email"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700"
            >Salario Mensual</label
          >
          <input
            type="number"
            [(ngModel)]="workerModel.salary"
            name="salary"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2"
          />
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700"
            >Departamentos (Múltiple)</label>
          <select
            [(ngModel)]="workerModel.department_ids"
            name="department_ids"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2"
            multiple
            >
            <option value="" disabled selected>
              Selecciona un departamento
            </option>
            <option *ngFor="let dept of departments()" [value]="dept.id">
              {{ dept.name }}
            </option>
          </select>
          <p class="text-xs text-gray-500 mt-1">Mantén presionado Ctrl (o Cmd) para seleccionar varios.</p>
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700 transition duration-200"
        >
          {{ isEditing ? 'Actualizar Trabajador' : 'Registrar Trabajador' }}
        </button>

        <button
          *ngIf="isEditing"
          type="button"
          (click)="cancelarEdicion()"
          class="w-full mt-2 bg-gray-500 text-white py-2 px-4 rounded hover:bg-gray-600 transition duration-200"
        >
          Cancelar Edición
        </button>
      </form>
    </div>
  </div>

  <div
    class="max-w-4xl mx-auto mt-10 bg-white shadow-lg rounded-lg overflow-hidden"
  >
    <table class="min-w-full leading-normal">
      <thead>
        <tr
          class="bg-gray-800 text-white text-left text-xs uppercase font-semibold"
        >
          <th class="px-5 py-3">Nombre</th>
          <th class="px-5 py-3">Email</th>
          <th class="px-5 py-3">Salario</th>
          <th class="px-5 py-3">Departamentos</th>
          <th class="px-5 py-3">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let w of filteredWorkers()"
          class="border-b border-gray-200 hover:bg-gray-50"
        >
          <td class="px-5 py-4 text-sm">{{ w.name }}</td>
          <td class="px-5 py-4 text-sm">{{ w.email }}</td>
          <td class="px-5 py-4 text-sm">{{ w.salary | currency }}</td>
          <td class="px-5 py-4 text-sm">{{ getDepartmentNames(w.departments) }}</td>
          <td class="px-5 py-4 text-sm gap-x-2 flex">
            <button
              (click)="prepararEdicion(w)"
              class="bg-gray-100 text-blue-600 px-3 py-1 rounded hover:text-blue-900 font-bold transition duration-200"
            >
              Editar
            </button>
            <button
              (click)="eliminarTrabajador(w.id)"
              class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600 transition duration-200"
            >
              Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
